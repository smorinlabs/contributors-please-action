name: contributors-please
description: Incremental, path-aware contributor recognition
author: Steve Morin
branding:
  icon: users
  color: green
inputs:
  app-id:
    description: GitHub App ID. Use with private-key for App mode.
    required: false
    default: ''
  private-key:
    description: GitHub App private key. Use with app-id for App mode.
    required: false
    default: ''
  pat:
    description: Personal access token fallback. Used when App credentials are absent.
    required: false
    default: ''
  output-file:
    description: File the rendered contributor list is written to. Unset inherits from config / core default (contributors.md).
    required: false
    default: ''
  template-file:
    description: Wrapper template file. Mutually exclusive with header/footer and in-place.
    required: false
    default: ''
  template-placeholder:
    description: Placeholder marker in template-file. Unset inherits from config / core default.
    required: false
    default: ''
  header:
    description: Inline text before the rendered block.
    required: false
    default: ''
  footer:
    description: Inline text after the rendered block.
    required: false
    default: ''
  in-place:
    description: >-
      Replace content in output-file between in-place markers. Leave unset to
      inherit from the config file (a non-empty default would override it).
    required: false
    default: ''
  in-place-marker-start:
    description: Start marker for in-place mode. Unset inherits from config / core default.
    required: false
    default: ''
  in-place-marker-end:
    description: End marker for in-place mode. Unset inherits from config / core default.
    required: false
    default: ''
  entry-template:
    description: Per-contributor entry template.
    required: false
    default: ''
  empty-text:
    description: Text rendered when no contributors are selected.
    required: false
    default: ''
  columns-per-row:
    description: >-
      Number of contributor entries per row. Unset inherits from the config file
      (a non-empty default would override it; the core defaults to 6).
    required: false
    default: ''
  state-file:
    description: JSONL contributor ledger path. Unset inherits from config / core default (.contributors.jsonl).
    required: false
    default: ''
  config-file:
    description: Classification config file path.
    required: false
    default: .contributors.yml
  sort:
    description: Sort mode, one of contributions, alphabetical, or first-seen. Unset inherits from config / core default (contributions).
    required: false
    default: ''
  min-contributions:
    description: Minimum commit count required for rendering. Unset inherits from config / core default (1).
    required: false
    default: ''
  ignore:
    description: Comma-separated logins to exclude.
    required: false
    default: ''
  unignore:
    description: Comma-separated logins to include even when auto-excluded.
    required: false
    default: ''
  mode:
    description: Run mode, one of commit, pull-request, or check.
    required: false
    default: commit
  dry-run:
    description: Compute outputs without writes or side effects.
    required: false
    default: 'false'
  bootstrap:
    description: Allow the action to bootstrap missing state in non-interactive mode.
    required: false
    default: 'false'
  commit-message:
    description: >-
      Commit message used when the action creates commits. The "[skip ci]"
      trailer is governed by the skip-ci input, not this message.
    required: false
    default: 'docs: update contributors'
  skip-ci:
    description: >-
      Append a "[skip ci]" trailer to the generated commit message.
      Defaults to "true" in commit mode (loop guard for commits pushed to the
      default branch) and "false" in pull-request mode, where the trailer
      prevents required status checks on the base branch from ever reporting.
    required: false
    default: ''
  skip-labeling:
    description: Suppress contributors-please PR label creation/application.
    required: false
    default: 'false'
  pin-warn-on-stale:
    description: Warn when pinned records differ from current classification. Unset inherits from config / core default (true).
    required: false
    default: ''
  github-server-url:
    description: Base URL of the GitHub instance.
    required: false
    default: ''
  github-api-url:
    description: Override REST API URL.
    required: false
    default: ''
  github-graphql-url:
    description: Override GraphQL API URL.
    required: false
    default: ''
  repository:
    description: >-
      owner/repo to operate on. Defaults to GITHUB_REPOSITORY. Use this to
      target a repository other than the one the workflow runs in (GITHUB_*
      env vars are reserved and cannot be overridden via `env:`).
    required: false
    default: ''
  branch:
    description: >-
      Branch to commit to / base pull requests on. Defaults to GITHUB_REF_NAME,
      then `main`.
    required: false
    default: ''
outputs:
  changed:
    description: true if files would be modified by this run.
  added-logins:
    description: JSON array of logins added this run.
  promoted-logins:
    description: JSON array of logins whose title changed this run.
  contributors-count:
    description: Number of contributors in the rendered output after filtering.
  token-source:
    description: Token source used by the action, app or pat.
  committer-login:
    description: GitHub login configured as the committer for this run.
  contributors-json:
    description: JSON array of contributor records after merge.
  pr-opened:
    description: true if a pull request was opened or updated.
  pr-number:
    description: Pull request number when pr-opened is true.
  pr-url:
    description: Pull request HTML URL when pr-opened is true.
  commit-sha:
    description: Commit SHA when mode commit creates a commit.
runs:
  using: node24
  main: dist/index.js
