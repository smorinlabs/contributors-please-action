# Release-please workflow for contributors-please-action.
# Opens release PR on push to main; merge of that PR creates a tag + GitHub
# Release, which fires the existing release.yml (tag verification, build,
# floating v1 maintenance, downstream publish gating).
#
# Auth uses one of two mechanisms that can BOTH open PRs and trigger downstream
# workflows (release.yml) — GITHUB_TOKEN is intentionally NOT used as a
# fallback, since it never triggers downstream workflows and may be blocked
# from opening PRs by org policy:
#   1. GitHub App (preferred): set RELEASE_PLEASE_CLIENT_ID (preferred,
#      e.g. "Iv23liA..." from the App's General settings page) OR the
#      deprecated RELEASE_PLEASE_APP_ID (numeric, legacy fallback) +
#      RELEASE_PLEASE_PRIVATE_KEY (App with Contents + Pull requests: write);
#      the job mints an installation token from them. The `app-id` input to
#      actions/create-github-app-token@v3 is deprecated in favor of `client-id`;
#      both code paths are kept here so the workflow keeps working until the
#      new RELEASE_PLEASE_CLIENT_ID secret is configured. Once it is set the
#      app-id fallback step is skipped and the deprecation warning goes away.
#   2. Fallback PAT: set RELEASE_PLEASE_APP_TOKEN (fine-grained PAT, Contents +
#      Pull requests: write).
# See smorinlabs/py-launch-blueprint's RELEASE.md for App setup. With neither
# configured, release-please fails fast.

name: release-please

on:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: release-please
  cancel-in-progress: false  # never cancel an in-flight release PR

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      # Surfaced so the app-token steps' `if:` can test them (secrets are not
      # available directly in `if:` conditions). Empty unless the App is set up.
      RP_CLIENT_ID: ${{ secrets.RELEASE_PLEASE_CLIENT_ID }}
      RP_APP_ID: ${{ secrets.RELEASE_PLEASE_APP_ID }}
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      pr: ${{ steps.rp.outputs.pr }}
    steps:
      # Preferred path: mint via the new `client-id` input. Runs when
      # RELEASE_PLEASE_CLIENT_ID is configured.
      - name: Mint release-please app token (client-id)
        id: app-token-client
        if: ${{ env.RP_CLIENT_ID != '' }}
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.RELEASE_PLEASE_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_PRIVATE_KEY }}

      # Backward-compat path: mint via the deprecated `app-id` input. Only
      # runs when the new RELEASE_PLEASE_CLIENT_ID secret is not yet set,
      # to avoid triggering the v3 deprecation warning post-migration.
      - name: Mint release-please app token (app-id, deprecated)
        id: app-token-app
        if: ${{ env.RP_CLIENT_ID == '' && env.RP_APP_ID != '' }}
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_PRIVATE_KEY }}

      - name: release-please
        id: rp
        uses: googleapis/release-please-action@v5.0.0
        with:
          # Minted App installation token (preferred — either client-id or
          # the deprecated app-id path) or the RELEASE_PLEASE_APP_TOKEN PAT —
          # all three open PRs and trigger downstream workflows. See
          # RELEASE.md in smorinlabs/py-launch-blueprint.
          token: ${{ steps.app-token-client.outputs.token || steps.app-token-app.outputs.token || secrets.RELEASE_PLEASE_APP_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # sync-dist job. Mirrors py-launch-blueprint's sync-uv-lock pattern.
  # Pre-empts `git diff --exit-code -- dist` failures on release PRs: the repo
  # ships a committed bundle at dist/contributors-please-lib.js (enforced via
  # `npm run check`), so any release PR that incidentally affects bundled
  # content (e.g. version-bearing strings baked into the bundle, dependency
  # graph shifts) would otherwise fail CI and require a manual
  # `npm run build && git push` from the release author. This job rebuilds and
  # commits dist/ back to the release PR branch automatically.
  sync-dist:
    name: sync-dist
    needs: release-please
    if: ${{ needs.release-please.outputs.pr != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      RP_CLIENT_ID: ${{ secrets.RELEASE_PLEASE_CLIENT_ID }}
      RP_APP_ID: ${{ secrets.RELEASE_PLEASE_APP_ID }}
    steps:
      # Mint a fresh installation token from the same App (a separate token —
      # steps don't cross jobs) so the dist sync commit pushed to the release
      # PR branch also triggers its CI checks. Same two-step backward-compat
      # pattern as the release-please job above.
      - name: Mint release-please app token (client-id)
        id: app-token-client
        if: ${{ env.RP_CLIENT_ID != '' }}
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.RELEASE_PLEASE_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_PRIVATE_KEY }}

      - name: Mint release-please app token (app-id, deprecated)
        id: app-token-app
        if: ${{ env.RP_CLIENT_ID == '' && env.RP_APP_ID != '' }}
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_PRIVATE_KEY }}

      - name: Checkout release PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ fromJson(needs.release-please.outputs.pr).headBranchName }}
          token: ${{ steps.app-token-client.outputs.token || steps.app-token-app.outputs.token || secrets.RELEASE_PLEASE_APP_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build dist bundle
        run: npm run build

      - name: Commit if changed
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          if ! git diff --quiet -- dist; then
            git add dist
            git commit -m "chore: sync dist"
            git push
          else
            echo "dist already in sync"
          fi
