name: E2E

on:
  workflow_dispatch:
    inputs:
      target-owner:
        description: Scratch repository owner.
        required: false
        default: smorinlabs
      target-repo:
        description: Scratch repository name.
        required: false
        default: contributors-please-e2e
  schedule:
    - cron: "17 8 * * *"
  push:
    tags:
      - v*.*.*

permissions:
  contents: read

jobs:
  scratch-repo:
    runs-on: ubuntu-latest
    env:
      TARGET_OWNER: ${{ inputs.target-owner || 'smorinlabs' }}
      TARGET_REPO: ${{ inputs.target-repo || 'contributors-please-e2e' }}
      ACTION_PATH: .github/actions/contributors-please-action
      # The action accepts EITHER a GitHub App (Client ID supplied via the
      # `app-id` input + private-key) OR a PAT. This suite auto-selects
      # whichever is configured: App preferred, PAT fallback (matching the
      # action's own resolveCredentials order).
      HAS_APP: ${{ secrets.CONTRIBUTORS_PLEASE_CLIENT_ID != '' && secrets.CONTRIBUTORS_PLEASE_PRIVATE_KEY != '' }}
      EXPECTED_TOKEN_SOURCE: ${{ (secrets.CONTRIBUTORS_PLEASE_CLIENT_ID != '' && secrets.CONTRIBUTORS_PLEASE_PRIVATE_KEY != '') && 'app' || 'pat' }}
    steps:
      - name: Verify a credential mechanism is configured
        env:
          CLIENT_ID: ${{ secrets.CONTRIBUTORS_PLEASE_CLIENT_ID }}
          PRIVATE_KEY: ${{ secrets.CONTRIBUTORS_PLEASE_PRIVATE_KEY }}
          PAT: ${{ secrets.CONTRIBUTORS_PLEASE_PAT }}
        run: |
          if { [ -n "$CLIENT_ID" ] && [ -n "$PRIVATE_KEY" ]; } || [ -n "$PAT" ]; then
            echo "Credential mechanism present; this run will use: ${EXPECTED_TOKEN_SOURCE}"
          else
            echo "Configure either CONTRIBUTORS_PLEASE_CLIENT_ID + CONTRIBUTORS_PLEASE_PRIVATE_KEY, or CONTRIBUTORS_PLEASE_PAT." >&2
            exit 1
          fi

      - name: Mint checkout App token
        id: app-token
        if: ${{ env.HAS_APP == 'true' }}
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.CONTRIBUTORS_PLEASE_CLIENT_ID }}
          private-key: ${{ secrets.CONTRIBUTORS_PLEASE_PRIVATE_KEY }}
          owner: ${{ env.TARGET_OWNER }}
          repositories: ${{ env.TARGET_REPO }}

      - name: Checkout scratch repository
        uses: actions/checkout@v6
        with:
          repository: ${{ env.TARGET_OWNER }}/${{ env.TARGET_REPO }}
          token: ${{ steps.app-token.outputs.token || secrets.CONTRIBUTORS_PLEASE_PAT }}
          ref: main
          fetch-depth: 0

      - name: Checkout action under test
        uses: actions/checkout@v6
        with:
          path: ${{ env.ACTION_PATH }}

      - name: Reset scratch repository contributor branch
        run: |
          # Idempotency across runs and auth modes. The action keys its branch
          # overwrite guard off the active token's committer login, and its
          # force-with-lease push relies on an in-sync remote-tracking ref. A
          # contributors-please/update branch left by a prior run (or a prior
          # auth mode, where PAT commits as the token user and App as the bot)
          # would otherwise block the next run. Delete it THROUGH this checkout
          # (not the REST API) so the remote branch, its PR, and the local
          # tracking ref are all cleared, leaving the action a clean create.
          git push origin --delete contributors-please/update \
            && echo "deleted stale contributors-please/update branch" \
            || echo "no stale contributors-please/update branch to delete"

      - name: Prepare synthetic contributor commit
        run: |
          mkdir -p src docs tests
          printf 'print("e2e %s")\n' "$GITHUB_RUN_ID" > "src/e2e-${GITHUB_RUN_ID}.py"
          printf '# E2E %s\n' "$GITHUB_RUN_ID" > "docs/e2e-${GITHUB_RUN_ID}.md"
          printf 'def test_e2e_%s():\n    assert True\n' "$GITHUB_RUN_ID" > "tests/test_e2e_${GITHUB_RUN_ID}.py"
          git add src docs tests
          git -c user.name="smorin" \
            -c user.email="smorin@users.noreply.github.com" \
            commit -m "test: contributors-please e2e ${GITHUB_RUN_ID}"
          git push origin HEAD:main

      - name: Exercise commit mode (App or PAT)
        id: commit-mode
        uses: ./.github/actions/contributors-please-action
        with:
          repository: ${{ env.TARGET_OWNER }}/${{ env.TARGET_REPO }}
          branch: main
          app-id: ${{ secrets.CONTRIBUTORS_PLEASE_CLIENT_ID }}
          private-key: ${{ secrets.CONTRIBUTORS_PLEASE_PRIVATE_KEY }}
          pat: ${{ env.HAS_APP != 'true' && secrets.CONTRIBUTORS_PLEASE_PAT || '' }}
          mode: commit
          bootstrap: true
          output-file: CONTRIBUTORS.md
          state-file: .contributors.jsonl
          config-file: .contributors.yml

      - name: Verify commit mode output
        run: |
          test "${{ steps.commit-mode.outputs.token-source }}" = "$EXPECTED_TOKEN_SOURCE"
          test "${{ steps.commit-mode.outputs.changed }}" = "true"
          test -n "${{ steps.commit-mode.outputs.commit-sha }}"

      - name: Prepare pull-request synthetic contributor commit
        run: |
          git checkout main
          git pull --ff-only origin main
          pr_path="src/e2e-pr-${GITHUB_RUN_ID}.py"
          printf 'print("e2e pr %s")\n' "$GITHUB_RUN_ID" > "$pr_path"
          git add src
          git -c user.name="smorin" \
            -c user.email="smorin@users.noreply.github.com" \
            commit -m "test: contributors-please pr ${GITHUB_RUN_ID}"
          git push origin HEAD:main

      - name: Exercise pull-request mode with App token
        id: pull-request-mode
        uses: ./.github/actions/contributors-please-action
        with:
          repository: ${{ env.TARGET_OWNER }}/${{ env.TARGET_REPO }}
          branch: main
          app-id: ${{ secrets.CONTRIBUTORS_PLEASE_CLIENT_ID }}
          private-key: ${{ secrets.CONTRIBUTORS_PLEASE_PRIVATE_KEY }}
          pat: ${{ env.HAS_APP != 'true' && secrets.CONTRIBUTORS_PLEASE_PAT || '' }}
          mode: pull-request
          bootstrap: true
          output-file: CONTRIBUTORS.md
          state-file: .contributors.jsonl
          config-file: .contributors.yml

      - name: Verify pull request and label
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.CONTRIBUTORS_PLEASE_PAT }}
          PR_NUMBER: ${{ steps.pull-request-mode.outputs.pr-number }}
        run: |
          set -euo pipefail
          test -n "$PR_NUMBER"

          is_rate_limit_error() {
            grep -qiE 'rate limit|secondary rate|abuse detection' "$1"
          }

          verify_with_rest() {
            local rest_error="/tmp/pull-request-verification-rest.err"
            if gh api --method GET "repos/${TARGET_OWNER}/${TARGET_REPO}/pulls/${PR_NUMBER}" \
              > /tmp/pull-request-core.json 2>"${rest_error}" &&
              gh api --method GET "repos/${TARGET_OWNER}/${TARGET_REPO}/issues/${PR_NUMBER}" \
                > /tmp/pull-request-issue.json 2>>"${rest_error}" &&
              gh api --method GET "repos/${TARGET_OWNER}/${TARGET_REPO}/pulls/${PR_NUMBER}/files" \
                -f per_page=100 \
                > /tmp/pull-request-files.json 2>>"${rest_error}"; then
              echo "Pull request verification API path: REST"
              node <<'NODE'
          const fs = require("node:fs");
          const issue = JSON.parse(fs.readFileSync("/tmp/pull-request-issue.json", "utf8"));
          const files = JSON.parse(fs.readFileSync("/tmp/pull-request-files.json", "utf8"));
          const hasPendingLabel = issue.labels.some(label => label.name === "contributors-please: pending");
          const filePaths = files.map(file => file.filename).sort();
          const expectedFiles = [".contributors.jsonl", "CONTRIBUTORS.md"];
          if (!hasPendingLabel || JSON.stringify(filePaths) !== JSON.stringify(expectedFiles)) {
            process.exit(1);
          }
          NODE
              return 0
            fi

            if is_rate_limit_error "${rest_error}"; then
              return 2
            fi

            cat "${rest_error}" >&2
            return 1
          }

          set +e
          verify_with_rest
          verify_status=$?
          set -e

          if [[ "${verify_status}" -eq 2 ]]; then
            echo "Pull request verification REST hit a rate limit; using GraphQL fallback." >&2
            gh pr view "$PR_NUMBER" \
              --repo "$TARGET_OWNER/$TARGET_REPO" \
              --json labels,files \
              --jq '
                (.labels | map(.name) | index("contributors-please: pending")) and
                ([.files[].path] | sort == [".contributors.jsonl", "CONTRIBUTORS.md"])
              ' | grep '^true$'
            echo "Pull request verification API path: GraphQL fallback"
          elif [[ "${verify_status}" -ne 0 ]]; then
            exit "${verify_status}"
          fi

      - name: Remove pending label before re-apply
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.CONTRIBUTORS_PLEASE_PAT }}
          PR_NUMBER: ${{ steps.pull-request-mode.outputs.pr-number }}
        run: |
          set -euo pipefail

          is_rate_limit_error() {
            grep -qiE 'rate limit|secondary rate|abuse detection' "$1"
          }

          rest_error="/tmp/remove-pending-label-rest.err"
          set +e
          gh api --method DELETE "repos/${TARGET_OWNER}/${TARGET_REPO}/issues/${PR_NUMBER}/labels/contributors-please:%20pending" \
            > /tmp/remove-pending-label.json 2>"${rest_error}"
          remove_status=$?
          set -e

          if [[ "${remove_status}" -eq 0 ]]; then
            echo "Label removal API path: REST"
          elif is_rate_limit_error "${rest_error}"; then
            echo "Label removal REST hit a rate limit; using GraphQL fallback." >&2
            gh pr edit "$PR_NUMBER" \
              --repo "$TARGET_OWNER/$TARGET_REPO" \
              --remove-label "contributors-please: pending"
            echo "Label removal API path: GraphQL fallback"
          else
            cat "${rest_error}" >&2
            exit "${remove_status}"
          fi

      - name: Prepare second synthetic contributor commit
        run: |
          git checkout main
          git pull --ff-only origin main
          reapply_path="docs/e2e-reapply-${GITHUB_RUN_ID}.md"
          printf '# E2E reapply %s\n' "$GITHUB_RUN_ID" > "$reapply_path"
          git add docs
          git -c user.name="smorin" \
            -c user.email="smorin@users.noreply.github.com" \
            commit -m "test: contributors-please label reapply ${GITHUB_RUN_ID}"
          git push origin HEAD:main

      - name: Re-apply pull request label with App token
        id: reapply-label-mode
        uses: ./.github/actions/contributors-please-action
        with:
          repository: ${{ env.TARGET_OWNER }}/${{ env.TARGET_REPO }}
          branch: main
          app-id: ${{ secrets.CONTRIBUTORS_PLEASE_CLIENT_ID }}
          private-key: ${{ secrets.CONTRIBUTORS_PLEASE_PRIVATE_KEY }}
          pat: ${{ env.HAS_APP != 'true' && secrets.CONTRIBUTORS_PLEASE_PAT || '' }}
          mode: pull-request
          bootstrap: true
          output-file: CONTRIBUTORS.md
          state-file: .contributors.jsonl
          config-file: .contributors.yml

      - name: Verify label was re-applied
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.CONTRIBUTORS_PLEASE_PAT }}
          PR_NUMBER: ${{ steps.reapply-label-mode.outputs.pr-number }}
        run: |
          set -euo pipefail
          test "$PR_NUMBER" = "${{ steps.pull-request-mode.outputs.pr-number }}"

          is_rate_limit_error() {
            grep -qiE 'rate limit|secondary rate|abuse detection' "$1"
          }

          rest_error="/tmp/verify-reapplied-label-rest.err"
          set +e
          gh api --method GET "repos/${TARGET_OWNER}/${TARGET_REPO}/issues/${PR_NUMBER}" \
            > /tmp/verify-reapplied-label.json 2>"${rest_error}"
          verify_label_status=$?
          set -e

          if [[ "${verify_label_status}" -eq 0 ]]; then
            echo "Label verification API path: REST"
            node <<'NODE'
          const fs = require("node:fs");
          const issue = JSON.parse(fs.readFileSync("/tmp/verify-reapplied-label.json", "utf8"));
          if (!issue.labels.some(label => label.name === "contributors-please: pending")) {
            process.exit(1);
          }
          NODE
          elif is_rate_limit_error "${rest_error}"; then
            echo "Label verification REST hit a rate limit; using GraphQL fallback." >&2
            gh pr view "$PR_NUMBER" \
              --repo "$TARGET_OWNER/$TARGET_REPO" \
              --json labels \
              --jq '
                .labels
                | map(.name)
                | index("contributors-please: pending") != null
              ' \
              | grep '^true$'
            echo "Label verification API path: GraphQL fallback"
          else
            cat "${rest_error}" >&2
            exit "${verify_label_status}"
          fi

      - name: Exercise idempotent check mode (App or PAT)
        id: check-mode
        uses: ./.github/actions/contributors-please-action
        with:
          repository: ${{ env.TARGET_OWNER }}/${{ env.TARGET_REPO }}
          branch: main
          app-id: ${{ secrets.CONTRIBUTORS_PLEASE_CLIENT_ID }}
          private-key: ${{ secrets.CONTRIBUTORS_PLEASE_PRIVATE_KEY }}
          pat: ${{ env.HAS_APP != 'true' && secrets.CONTRIBUTORS_PLEASE_PAT || '' }}
          mode: check
          dry-run: true
          output-file: CONTRIBUTORS.md
          state-file: .contributors.jsonl
          config-file: .contributors.yml

      - name: Verify check mode output
        run: |
          test "${{ steps.check-mode.outputs.token-source }}" = "$EXPECTED_TOKEN_SOURCE"
          test "${{ steps.check-mode.outputs.changed }}" = "false"

  github-enterprise-smoke:
    if: ${{ vars.GHE_SERVER_URL != '' && vars.GHE_TARGET_OWNER != '' && vars.GHE_TARGET_REPO != '' }}
    runs-on: [self-hosted, contributors-please-ghe]
    env:
      GHE_SERVER_URL: ${{ vars.GHE_SERVER_URL }}
      GHE_TARGET_OWNER: ${{ vars.GHE_TARGET_OWNER }}
      GHE_TARGET_REPO: ${{ vars.GHE_TARGET_REPO }}
      ACTION_PATH: .github/actions/contributors-please-action
    steps:
      - name: Verify required GitHub Enterprise inputs
        env:
          GHE_PAT: ${{ secrets.GHE_CONTRIBUTORS_PLEASE_PAT }}
        run: |
          test -n "$GHE_SERVER_URL"
          test -n "$GHE_TARGET_OWNER"
          test -n "$GHE_TARGET_REPO"
          test -n "$GHE_PAT"

      - name: Checkout GitHub Enterprise smoke repository
        uses: actions/checkout@v6
        with:
          repository: ${{ env.GHE_TARGET_OWNER }}/${{ env.GHE_TARGET_REPO }}
          token: ${{ secrets.GHE_CONTRIBUTORS_PLEASE_PAT }}
          github-server-url: ${{ vars.GHE_SERVER_URL }}
          ref: main
          fetch-depth: 0

      - name: Checkout action under test
        uses: actions/checkout@v6
        with:
          path: ${{ env.ACTION_PATH }}

      - name: Exercise GitHub Enterprise smoke
        id: ghe-smoke
        uses: ./.github/actions/contributors-please-action
        env:
          GITHUB_REPOSITORY: ${{ env.GHE_TARGET_OWNER }}/${{ env.GHE_TARGET_REPO }}
          GITHUB_SERVER_URL: ${{ vars.GHE_SERVER_URL }}
          GITHUB_REF_NAME: main
        with:
          pat: ${{ secrets.GHE_CONTRIBUTORS_PLEASE_PAT }}
          github-server-url: ${{ vars.GHE_SERVER_URL }}
          github-api-url: ${{ vars.GHE_API_URL }}
          github-graphql-url: ${{ vars.GHE_GRAPHQL_URL }}
          mode: check
          dry-run: "true"
          bootstrap: "true"
          output-file: CONTRIBUTORS.md
          state-file: .contributors.jsonl
          config-file: .contributors.yml

      - name: Verify GitHub Enterprise smoke output
        run: |
          test "${{ steps.ghe-smoke.outputs.token-source }}" = "pat"
          test -n "${{ steps.ghe-smoke.outputs.committer-login }}"
