name: engine-sync

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "23 9 * * *"
  repository_dispatch:
    types:
      - contributors-please-released
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Check engine version references
        env:
          CONTRIBUTORS_PLEASE_LIBRARY_REF: ${{ vars.CONTRIBUTORS_PLEASE_LIBRARY_REF }}
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/check-engine-sync.mjs
