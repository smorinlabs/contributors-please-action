name: Downstream E2E

run-name: downstream E2E ${{ github.event.workflow_run.head_sha || inputs.action_ref || github.sha }}

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      action_ref:
        description: contributors-please-action ref to test downstream.
        required: false
        default: main
      wait:
        description: Wait for contributors-please-test to finish.
        required: false
        default: true
        type: boolean
      suite_scope:
        description: Downstream validation lane (fast = PR/ref subset, full = release).
        required: false
        default: full
        type: choice
        options:
          - full
          - fast

permissions:
  contents: read

concurrency:
  group: contributors-please-action-downstream-${{ github.event.workflow_run.head_sha || inputs.action_ref || github.sha }}
  cancel-in-progress: true

jobs:
  dispatch:
    name: Dispatch contributors-please-test
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      TARGET_REPO: smorinlabs/contributors-please-test
      TARGET_WORKFLOW: action-downstream-suite.yml
      GH_TOKEN: ${{ secrets.CONTRIBUTORS_PLEASE_TEST_DISPATCH_TOKEN }}
      ACTION_REF: ${{ github.event.workflow_run.head_sha || inputs.action_ref || github.sha }}
      SOURCE_RUN_ID: ${{ github.run_id }}
      SOURCE_REPO: ${{ github.repository }}
      SOURCE_WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id || github.run_id }}
      SOURCE_WORKFLOW: ${{ github.workflow }}
      WAIT_FOR_RESULT: ${{ github.event_name != 'workflow_dispatch' || inputs.wait }}
      # Lane selector (Task 9): release/main propagation defaults to the full lane;
      # explicit PR/ref validation can pass fast. Default full preserves behavior.
      SUITE_SCOPE: ${{ inputs.suite_scope || 'full' }}
      REPLAY_PATH: downstream-e2e-replay.json
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.ACTION_REF }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Verify dispatch token
        run: |
          set -euo pipefail
          test -n "${GH_TOKEN}"

      - name: Read action engine ref
        run: |
          set -euo pipefail
          LIBRARY_REF="$(tr -d '[:space:]' < .contributors-please-engine-ref)"
          test -n "${LIBRARY_REF}"
          echo "LIBRARY_REF=${LIBRARY_REF}" >> "$GITHUB_ENV"

      # Dispatch behavior (validate, retry, replay artifact) is unit-tested in
      # test/dispatch-downstream-suite.test.ts. SOURCE_SHA mirrors ACTION_REF, as the
      # previous inline step did.
      - name: Dispatch downstream suite
        env:
          SOURCE_SHA: ${{ env.ACTION_REF }}
        run: node scripts/dispatch-downstream-suite.mjs

      - name: Wait for downstream suite
        if: ${{ env.WAIT_FOR_RESULT == 'true' }}
        run: node scripts/wait-downstream-suite.mjs
